<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GUGU Economy Note</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Serif KR', serif;
  background:#f5f1e8;
  color:#2b2b2b;
  padding:60px 20px;
  line-height:1.8;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fffdf8;
  padding:60px 50px;
  box-shadow:0 10px 40px rgba(0,0,0,0.05);
  border-radius:8px;
}
h1{font-size:28px;margin-bottom:10px;font-weight:600;}
.date{font-size:14px;color:#777;margin-bottom:40px;}
.section{margin-bottom:60px;}
.section h2{
  font-size:18px;
  margin-bottom:20px;
  font-weight:500;
  border-bottom:1px solid #e6e0d6;
  padding-bottom:8px;
}
.news-list a{
  display:block;
  margin-bottom:15px;
  text-decoration:none;
  color:#2b2b2b;
  padding-bottom:10px;
  border-bottom:1px dashed #e0d9cc;
}
.news-list a:hover{opacity:0.7;}
textarea, input{
  width:100%;
  border:none;
  border-bottom:1px solid #ddd;
  background:transparent;
  padding:10px 5px;
  font-size:15px;
  margin-bottom:15px;
  font-family:'Noto Serif KR', serif;
  resize:vertical;
}
textarea:focus, input:focus{outline:none;border-bottom:1px solid #999;}
button{
  background:#2b2b2b;
  color:#fff;
  border:none;
  padding:10px 20px;
  font-size:14px;
  cursor:pointer;
  border-radius:4px;
  margin-top:10px;
}
button:hover{opacity:0.8;}
.footer-note{margin-top:40px;font-size:12px;color:#999;text-align:center;}
@media(max-width:600px){.container{padding:40px 25px;}}
</style>
</head>
<body>

<div class="container">
  <h1>GUGU Economy Note</h1>
  <div class="date" id="todayDate"></div>

  <div class="section">
    <h2>📰 오늘의 경제 뉴스</h2>
    <div class="news-list" id="newsList">불러오는 중...</div>
  </div>

  <div class="section">
    <h2>1. 오늘 한 줄 분위기</h2>
    <textarea id="summary" rows="2" placeholder="오늘 경제 분위기를 한 문장으로 적어보세요."></textarea>
  </div>

  <div class="section">
    <h2>2. 오늘 핵심 뉴스 정리</h2>
    <textarea id="news1" rows="3" placeholder="뉴스 1 정리"></textarea>
    <textarea id="news2" rows="3" placeholder="뉴스 2 정리"></textarea>
    <textarea id="news3" rows="3" placeholder="뉴스 3 정리"></textarea>
  </div>

  <div class="section">
    <h2>3. 오늘의 경제 개념</h2>
    <input type="text" id="conceptTitle" placeholder="개념 이름 (예: 기준금리)">
    <textarea id="conceptDesc" rows="3" placeholder="쉬운 설명으로 적어보세요."></textarea>
  </div>

  <div class="section">
    <h2>4. 오늘 내가 이해한 것</h2>
    <textarea id="reflection" rows="3" placeholder="오늘 새롭게 이해한 내용을 적어보세요."></textarea>
  </div>

  <button onclick="saveNote()">저장하기</button>
  <div class="footer-note">* 저장하면 이 브라우저에 자동 보관됩니다.</div>
</div>

<script>
// 날짜 표시
const today = new Date();
document.getElementById('todayDate').innerText =
  today.getFullYear() + "." + (today.getMonth()+1).toString().padStart(2,'0') + "." + today.getDate().toString().padStart(2,'0');

// NewsAPI로 경제 뉴스 불러오기
const apiKey = "f923a6c18ee647ef9eee5be98ae618b7";
const newsUrl = `https://newsapi.org/v2/top-headlines?country=kr&category=business&pageSize=5&apiKey=${apiKey}`;

fetch("/api/news")
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('newsList');
    list.innerHTML = "";

    if(data.articles && data.articles.length > 0){
      data.articles.forEach(article => {
        const a = document.createElement('a');
        a.href = article.url;
        a.target = "_blank";
        a.innerText = "• " + article.title;
        list.appendChild(a);
      });
    } else {
      list.innerText = "뉴스를 불러오지 못했습니다.";
    }
  })
  .catch(() => {
    document.getElementById('newsList').innerText = "뉴스를 불러오지 못했습니다.";
  });
  .catch(() => {
    document.getElementById('newsList').innerText = "뉴스를 불러오지 못했습니다.";
  });
  })
  .catch(() => {
    document.getElementById('newsList').innerText = "뉴스를 불러오지 못했습니다.";
  });

// 저장 기능
function saveNote(){
  const data = {
    summary: summary.value,
    news1: news1.value,
    news2: news2.value,
    news3: news3.value,
    conceptTitle: conceptTitle.value,
    conceptDesc: conceptDesc.value,
    reflection: reflection.value
  };
  localStorage.setItem('guguEconomyNote', JSON.stringify(data));
  alert('오늘 기록이 저장되었습니다 ☕');
}

// 불러오기
window.onload = function(){
  const saved = localStorage.getItem('guguEconomyNote');
  if(saved){
    const data = JSON.parse(saved);
    summary.value = data.summary || '';
    news1.value = data.news1 || '';
    news2.value = data.news2 || '';
    news3.value = data.news3 || '';
    conceptTitle.value = data.conceptTitle || '';
    conceptDesc.value = data.conceptDesc || '';
    reflection.value = data.reflection || '';
  }
}
</script>

</body>
</html>
